<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

<!-- Auth Section -->
<div id="auth-section" class="flex items-center justify-center min-h-screen">
  <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">
    <h1 class="text-3xl font-bold text-center text-indigo-600 mb-6">Task Manager</h1>
    <div id="login-form">
      <h2 class="text-xl font-semibold mb-4">Login</h2>
      <input id="login-username" type="text" placeholder="Username" class="w-full border rounded-lg p-3 mb-3 focus:outline-none focus:ring-2 focus:ring-indigo-400" />
      <input id="login-password" type="password" placeholder="Password" class="w-full border rounded-lg p-3 mb-4 focus:outline-none focus:ring-2 focus:ring-indigo-400" />
      <button onclick="login()" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition">Login</button>
      <p class="text-center mt-4 text-sm">No account? <a href="#" onclick="showRegister()" class="text-indigo-600 font-semibold">Register</a></p>
    </div>
    <div id="register-form" class="hidden">
      <h2 class="text-xl font-semibold mb-4">Register</h2>
      <input id="reg-email" type="email" placeholder="Email" class="w-full border rounded-lg p-3 mb-3 focus:outline-none focus:ring-2 focus:ring-indigo-400" />
      <input id="reg-username" type="text" placeholder="Username" class="w-full border rounded-lg p-3 mb-3 focus:outline-none focus:ring-2 focus:ring-indigo-400" />
      <input id="reg-password" type="password" placeholder="Password" class="w-full border rounded-lg p-3 mb-4 focus:outline-none focus:ring-2 focus:ring-indigo-400" />
      <button onclick="register()" class="w-full bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700 transition">Register</button>
      <p class="text-center mt-4 text-sm">Have account? <a href="#" onclick="showLogin()" class="text-indigo-600 font-semibold">Login</a></p>
    </div>
    <p id="auth-error" class="text-red-500 text-sm text-center mt-3 hidden"></p>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard" class="hidden">
  <nav class="bg-indigo-600 text-white px-6 py-4 flex justify-between items-center shadow">
    <h1 class="text-xl font-bold">📋 Task Manager</h1>
    <div class="flex items-center gap-4">
      <span id="username-display" class="text-sm font-medium"></span>
      <button onclick="logout()" class="bg-white text-indigo-600 px-4 py-1.5 rounded-lg text-sm font-semibold hover:bg-indigo-50 transition">Logout</button>
    </div>
  </nav>
  <div class="max-w-4xl mx-auto px-4 py-8">
    <!-- Stats -->
    <div class="grid grid-cols-3 gap-4 mb-8">
      <div class="bg-white rounded-xl p-5 shadow text-center"><p class="text-3xl font-bold text-indigo-600" id="total-count">0</p><p class="text-gray-500 text-sm mt-1">Total Tasks</p></div>
      <div class="bg-white rounded-xl p-5 shadow text-center"><p class="text-3xl font-bold text-green-500" id="done-count">0</p><p class="text-gray-500 text-sm mt-1">Completed</p></div>
      <div class="bg-white rounded-xl p-5 shadow text-center"><p class="text-3xl font-bold text-yellow-500" id="pending-count">0</p><p class="text-gray-500 text-sm mt-1">Pending</p></div>
    </div>
    <!-- Add Task -->
    <div class="bg-white rounded-xl p-6 shadow mb-6">
      <h2 class="text-lg font-semibold mb-4">Add New Task</h2>
      <div class="flex flex-col md:flex-row gap-3">
        <input id="task-title" type="text" placeholder="Task title..." class="flex-1 border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-indigo-400" />
        <input id="task-desc" type="text" placeholder="Description (optional)" class="flex-1 border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-indigo-400" />
        <select id="task-priority" class="border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-indigo-400">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
        <button onclick="addTask()" class="bg-indigo-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-indigo-700 transition">Add</button>
      </div>
    </div>
    <!-- Task List -->
    <div id="task-list" class="space-y-3"></div>
    <p id="no-tasks" class="text-center text-gray-400 mt-10 hidden">No tasks yet. Add one above!</p>
  </div>
</div>

<script>
const API = 'http://localhost:8000';
let token = localStorage.getItem('token');
let currentUser = localStorage.getItem('username');

const priorityColors = { low: 'bg-green-100 text-green-700', medium: 'bg-yellow-100 text-yellow-700', high: 'bg-red-100 text-red-700' };

if (token) showDashboard();

function showRegister() { document.getElementById('login-form').classList.add('hidden'); document.getElementById('register-form').classList.remove('hidden'); }
function showLogin() { document.getElementById('register-form').classList.add('hidden'); document.getElementById('login-form').classList.remove('hidden'); }

async function register() {
  const email = document.getElementById('reg-email').value;
  const username = document.getElementById('reg-username').value;
  const password = document.getElementById('reg-password').value;
  const res = await fetch(`${API}/auth/register`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email, username, password}) });
  if (res.ok) { showLogin(); showError('Registered! Please login.', false); } else { const e = await res.json(); showError(e.detail); }
}

async function login() {
  const username = document.getElementById('login-username').value;
  const password = document.getElementById('login-password').value;
  const body = new URLSearchParams({ username, password });
  const res = await fetch(`${API}/auth/login`, { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body });
  if (res.ok) { const data = await res.json(); token = data.access_token; localStorage.setItem('token', token); localStorage.setItem('username', username); currentUser = username; showDashboard(); }
  else showError('Invalid credentials');
}

function logout() { localStorage.removeItem('token'); localStorage.removeItem('username'); token = null; document.getElementById('dashboard').classList.add('hidden'); document.getElementById('auth-section').classList.remove('hidden'); }

function showError(msg, isError=true) { const el = document.getElementById('auth-error'); el.textContent = msg; el.classList.remove('hidden'); el.className = isError ? 'text-red-500 text-sm text-center mt-3' : 'text-green-500 text-sm text-center mt-3'; }

function showDashboard() { document.getElementById('auth-section').classList.add('hidden'); document.getElementById('dashboard').classList.remove('hidden'); document.getElementById('username-display').textContent = currentUser; loadTasks(); }

async function loadTasks() {
  const res = await fetch(`${API}/tasks/`, { headers: { Authorization: `Bearer ${token}` } });
  if (!res.ok) { logout(); return; }
  const tasks = await res.json();
  renderTasks(tasks);
}

function renderTasks(tasks) {
  const list = document.getElementById('task-list');
  const noTasks = document.getElementById('no-tasks');
  document.getElementById('total-count').textContent = tasks.length;
  document.getElementById('done-count').textContent = tasks.filter(t=>t.completed).length;
  document.getElementById('pending-count').textContent = tasks.filter(t=>!t.completed).length;
  if (!tasks.length) { list.innerHTML = ''; noTasks.classList.remove('hidden'); return; }
  noTasks.classList.add('hidden');
  list.innerHTML = tasks.map(t => `
    <div class="bg-white rounded-xl p-4 shadow flex items-center gap-4 ${t.completed ? 'opacity-60' : ''}">
      <input type="checkbox" ${t.completed ? 'checked' : ''} onchange="toggleTask(${t.id}, ${!t.completed})" class="w-5 h-5 accent-indigo-600 cursor-pointer" />
      <div class="flex-1">
        <p class="font-medium ${t.completed ? 'line-through text-gray-400' : 'text-gray-800'}">${t.title}</p>
        ${t.description ? `<p class="text-sm text-gray-500">${t.description}</p>` : ''}
      </div>
      <span class="text-xs font-semibold px-2 py-1 rounded-full ${priorityColors[t.priority]}">${t.priority}</span>
      <button onclick="deleteTask(${t.id})" class="text-red-400 hover:text-red-600 transition text-lg">🗑</button>
    </div>`).join('');
}

async function addTask() {
  const title = document.getElementById('task-title').value.trim();
  if (!title) return;
  const description = document.getElementById('task-desc').value.trim();
  const priority = document.getElementById('task-priority').value;
  await fetch(`${API}/tasks/`, { method:'POST', headers:{'Content-Type':'application/json', Authorization:`Bearer ${token}`}, body: JSON.stringify({title, description, priority}) });
  document.getElementById('task-title').value = '';
  document.getElementById('task-desc').value = '';
  loadTasks();
}

async function toggleTask(id, completed) {
  await fetch(`${API}/tasks/${id}`, { method:'PUT', headers:{'Content-Type':'application/json', Authorization:`Bearer ${token}`}, body: JSON.stringify({completed}) });
  loadTasks();
}

async function deleteTask(id) {
  await fetch(`${API}/tasks/${id}`, { method:'DELETE', headers:{ Authorization:`Bearer ${token}` } });
  loadTasks();
}
</script>
</body>
</html>
